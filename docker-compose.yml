services:
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcp-server
    ports:
      - "${PORT}:${PORT}"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - mcp-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT}/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  mcp-client:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcp-client
    depends_on:
      mcp-server:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - MCP_SERVER_URL=http://mcp-server:${PORT}/sse
    networks:
      - mcp-network
    command: python client.py --interactive
    stdin_open: true
    tty: true

networks:
  mcp-network:
    driver: bridge